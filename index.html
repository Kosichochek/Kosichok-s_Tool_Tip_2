<body class="overflow-hidden h-screen flex">

    <div id="customAlertModal" class="hidden fixed inset-0 z-[300] glass-modal flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-80 border text-center relative">
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="text-lg font-bold mb-2 text-gray-800" data-i18n="alert_title">Внимание</h3>
            <p id="customAlertMsg" class="text-sm text-gray-500 mb-6">Message goes here</p>
            <button onclick="closeModal('customAlertModal')" class="bg-[#0A58CA] text-white px-6 py-2 rounded-lg font-bold w-full btn-active">ОК</button>
        </div>
    </div>

    <div id="customPromptModal" class="hidden fixed inset-0 z-[300] glass-modal flex items-center justify-center">

            <h3 id="promptTitle" class="text-lg font-bold mb-4 text-gray-800">Введите значение</h3>

            </div>
        </div>

        </div>
        <div class="absolute top-6 right-6">

                <div class="flex items-center gap-2 cursor-pointer border rounded-lg px-3 py-1.5 bg-gray-50 hover:bg-gray-100 transition-colors" onclick="document.getElementById('langMenuLanding').classList.toggle('hidden')">

            </button>

        </nav>
        <div class="p-4 border-t space-y-2">
            <button onclick="showPage('profile')" class="w-full flex items-center p-3 rounded-lg transition-all hover:bg-gray-50 text-sm" id="adminProfileBtn">
                <i class="fas fa-user mr-3 text-gray-400"></i> <span class="text-gray-500 font-medium" data-i18n="nav_admin_profile">Профиль Админа</span>
            </button>
            <button onclick="logout()" class="w-full flex items-center p-3 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-500 text-sm transition-all">
                <i class="fas fa-sign-out-alt mr-3"></i> <span data-i18n="nav_logout">Выйти</span>

    <main class="flex-1 flex flex-col overflow-hidden relative z-10">
        <header class="h-16 border-b bg-white flex items-center justify-between px-8 relative z-30">
            <div id="breadcrumb" class="text-sm font-medium text-gray-400">Дашборд (Карта)</div>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <i class="fas fa-bell text-gray-400 cursor-pointer hover:text-gray-600" onclick="document.getElementById('notifMenu').classList.toggle('hidden')"></i>
                    <span id="notifCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>

                    </div>
                </div>
            </div>
        </header>
        <section class="flex-1 overflow-y-auto p-8" id="pageContent"></section>

    <div id="bookingModal" class="hidden fixed inset-0 z-[200] glass-modal flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-96 border">
            <h2 class="text-xl font-bold mb-4" data-i18n="book_spot_title">Забронировать место</h2>
            <form onsubmit="confirmBooking(event)" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase" data-i18n="country">Формат страны</label>
                    <select id="plateCountry" class="w-full border p-2 rounded-lg mt-1 cursor-pointer focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                        <option value="KZ">Kazakhstan (123ABC02)</option>
                        <option value="RU">Russia (A123AA77)</option>
                        <option value="ANY" data-i18n="other">Другой формат</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase" data-i18n="license_plate">Госномер</label>
                    <input type="text" id="bookPlate" required placeholder="123ABC02" class="w-full border p-2 rounded-lg mt-1 uppercase focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase" data-i18n="duration">Время (Часов)</label>
                    <input type="number" id="bookHours" required min="1" max="24" value="1" class="w-full border p-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="submit" class="bg-[#0A58CA] text-white px-4 py-2 rounded-lg flex-1 btn-active font-bold" data-i18n="confirm">Подтвердить</button>
                    <button type="button" onclick="closeModal('bookingModal')" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg flex-1 font-bold" data-i18n="cancel">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <div id="topUpModal" class="hidden fixed inset-0 z-[200] glass-modal flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-96 border">
            <h2 class="text-xl font-bold mb-4" data-i18n="top_up">Пополнить баланс</h2>
            <form onsubmit="processTopUp(event)" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase" data-i18n="card_num">Номер карты</label>
                    <input type="text" id="ccNumber" required pattern="\d{16}" title="16 digits" maxlength="16" placeholder="0000 0000 0000 0000" class="w-full border p-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Expiry</label>
                        <input type="text" oninput="formatExpiry(this)" required pattern="\d{2}/\d{2}" placeholder="MM/YY" class="w-full border p-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">CVV</label>
                        <input type="password" required pattern="\d{3}" title="3 digits" maxlength="3" placeholder="123" class="w-full border p-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase" data-i18n="amount">Сумма ($)</label>
                    <input type="number" id="topUpAmount" required min="1" max="1000" placeholder="10.00" class="w-full border p-2 rounded-lg mt-1 focus:outline-none focus:ring-2 focus:ring-[#0A58CA]">
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="submit" class="bg-[#0A58CA] text-white px-4 py-2 rounded-lg flex-1 btn-active font-bold" data-i18n="pay">Оплатить</button>
                    <button type="button" onclick="closeModal('topUpModal')" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg flex-1 font-bold" data-i18n="cancel">Отмена</button>
                </div>
            </form>
        </div>
    </div>

        let wallet = 25.50;
        let userProfile = { name: "John Doe", email: "john@smartcity.gov", phone: "+15551234567", carPlate: "123ABC02" };
        
        let activeSessions = []; 
        let allBookings = []; 

        // Инициализируем историю стартовыми данными (вчера, позавчера)
        let today = new Date();
        let yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
        let twoDaysAgo = new Date(today); twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);

        let parkingHistory = [
            { 
                startDate: yesterday.toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}), 
                endDate: new Date(yesterday.getTime() + 7200000).toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}), 
                zone: 'A', plate: '777ABC02', cost: 11.00 
            },
            { 
                startDate: twoDaysAgo.toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}), 
                endDate: new Date(twoDaysAgo.getTime() + 10800000).toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}), 
                zone: 'D', plate: '123ABC02', cost: 24.00 
            }
        ]; 

        // Генерируем график на основе истории (высчитываем выручку за последние 7 дней)
        function getRevenueData() {
            let labels = [];
            let data = [];
            for (let i = 6; i >= 0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let dateStr = d.toLocaleDateString([], {day: 'numeric', month: 'short'});
                labels.push(dateStr);
                
                // Суммируем профит за этот день
                let dayTotal = parkingHistory.reduce((sum, record) => {
                    let recordDate = new Date(record.endDate);
                    if (recordDate.getDate() === d.getDate() && recordDate.getMonth() === d.getMonth()) {
                        return sum + record.cost;
                    }
                    return sum;
                }, 0);
                
                // Добавляем немного системной базы, чтобы график не был совсем пустым в предыдущие дни
                // В реальном проекте тут будет запрос к БД.
                let baseNoise = i === 0 ? 0 : Math.floor(Math.random() * 50) + 20; 
                data.push(dayTotal + baseNoise);
            }
            return { labels, data };
        }
        
        let pendingZoneId = null;

        const translations = {

            document.getElementById('promptTitle').innerText = title;

            input.value = defaultValue;
            promptCallback = callback;
            openModal('customPromptModal');

        // --- SEARCH & ACTIONS ---
        function renderSearchTable() {
            let filter = document.getElementById('searchInput')?.value.toLowerCase() || '';
            let html = '';
            let filtered = allBookings.filter(b => b.plate.toLowerCase().includes(filter));
            if(filtered.length === 0) html = `<tr><td colspan="5" class="p-4 text-center text-gray-500">${t('no_vehicles')}</td></tr>`;
            filtered.forEach(b => {
                html += `<tr>
                    <td class="p-4 font-mono font-bold">${b.plate}</td>
                    <td class="p-4">Zone ${b.zone}</td>
                    <td class="p-4">${b.duration}h</td>
                    <td class="p-4 font-bold text-green-600">$${b.paidCost.toFixed(2)}</td>
                    <td class="p-4 text-center"><button onclick="deleteBooking(${b.id})" class="text-red-500 hover:text-red-700 transition-colors"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            const tbody = document.getElementById('searchTbody');
            if(tbody) tbody.innerHTML = html;
        }

        function deleteBooking(id) {
            if(confirm("Удалить бронь?")) {
                allBookings = allBookings.filter(b => b.id !== id);
                renderSearchTable();
                updateNotifications();
            }
        }

        // --- BOOKING LOGIC ---
        function initiateBooking(zoneId) {
            pendingZoneId = zoneId;
            document.getElementById('bookPlate').value = currentRole === 'user' ? userProfile.carPlate : '';
            openModal('bookingModal');
        }

        function confirmBooking(e) {
            e.preventDefault();
            let hours = parseFloat(document.getElementById('bookHours').value);
            let plate = document.getElementById('bookPlate').value.toUpperCase();
            let country = document.getElementById('plateCountry').value;

            if (country === 'KZ' && !/^\d{3}[A-Z]{3}\d{2}$/.test(plate)) {
                customAlert(lang==='ru' ? "Неверный формат KZ. Пример: 123ABC02" : "Invalid KZ format. Ex: 123ABC02"); return;
            } else if (country === 'RU' && !/^[A-Z]\d{3}[A-Z]{2}\d{2,3}$/.test(plate)) {
                customAlert(lang==='ru' ? "Неверный формат RU. Пример: A123AA77" : "Invalid RU format. Ex: A123AA77"); return;
            } else if (!/^[A-Z0-9- ]{3,10}$/.test(plate)) {
                customAlert(lang==='ru' ? "Неверный формат номера." : "Invalid Plate format."); return;
            }

            let z = zones.find(x => x.id === pendingZoneId);
            let cost = hours * z.rate;
            
            let newBooking = { id: Date.now(), zone: z.id, zoneName: z.name, rate: z.rate, startTime: new Date(), duration: hours, plate: plate, paidCost: cost };

            if(currentRole === 'user') {
                if(wallet >= cost) {
                    wallet -= cost;
                    activeSessions.push(newBooking);
                    allBookings.push(newBooking);
                    showToast(t('success'), `${t('paid')} $${cost.toFixed(2)}`);
                    closeModal('bookingModal');
                    showPage('userDashboard');
                    updateNotifications();
                } else {
                    customAlert(t('no_funds'));
                    closeModal('bookingModal');
                    openModal('topUpModal');
                }
            }
        }

        function renderUserDashboard() {
            const content = document.getElementById('pageContent');
            let sessionsHtml = '';
            
            if(activeSessions.length === 0) {
                sessionsHtml = `
                    <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200 text-center shadow-sm">
                        <p class="text-gray-500 font-bold mb-4">${t('no_parking')}</p>
                        <button onclick="showPage('findParking')" class="bg-[#0A58CA] text-white px-6 py-2 rounded-lg font-bold w-full">${t('find_spot')}</button>
                    </div>`;
            } else {
                activeSessions.forEach(session => {
                    const diffMs = new Date() - session.startTime;
                    const currentHours = Math.max(session.duration, diffMs / 3600000); 
                    const currentCost = currentHours * session.rate;
                    const isOverdue = currentHours > session.duration;

                    sessionsHtml += `
                        <div class="bg-green-50 p-6 rounded-2xl border-2 ${isOverdue ? 'border-red-400 bg-red-50' : 'border-green-300'} shadow-sm relative overflow-hidden mb-4">
                            <div class="absolute top-0 left-0 w-full h-1 ${isOverdue ? 'bg-red-500' : 'bg-green-500'}"></div>
                            <span class="text-[10px] font-bold ${isOverdue ? 'text-red-700' : 'text-green-700'} uppercase tracking-widest"><i class="fas fa-car mr-1"></i> ${session.plate}</span>
                            <h2 class="text-2xl font-bold mt-2">Zone ${session.zone}</h2>
                            <p class="text-sm text-gray-600 mt-2"><i class="far fa-clock mr-1"></i>${t('start')}: ${session.startTime.toLocaleTimeString()}</p>
                            <p class="text-sm text-gray-600"><i class="far fa-credit-card mr-1"></i>${t('paid_hours')}: ${session.duration}</p>

                            <div class="mt-6 flex gap-2">
                                <button onclick="endSession(${session.id}, ${currentCost})" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg btn-active font-bold text-sm shadow-md">${t('btn_end')}</button>
                                <button onclick="extendSession(${session.id})" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 py-3 rounded-lg btn-active font-bold text-sm">${t('btn_extend')}</button>
                            </div>
                        </div>`;
                });
            }

            content.innerHTML = `
                <h1 class="text-2xl font-bold mb-8">${t('nav_my_dashboard')}</h1>
                <div class="grid grid-cols-3 gap-8">
                    <div class="col-span-1">
                        ${sessionsHtml}
                        <div class="bg-white p-6 rounded-2xl border shadow-sm mt-6">
                            <p class="text-xs text-gray-400 font-bold uppercase">${t('wallet')}</p>
                            <p class="text-3xl font-bold mt-1">$${wallet.toFixed(2)}</p>
                            <button onclick="openModal('topUpModal')" class="w-full mt-4 bg-[#0A58CA] text-white py-2 rounded-lg btn-active font-bold text-sm">${t('top_up')}</button>
                        </div>
                    </div>
                    <div class="col-span-2 bg-white rounded-2xl border p-6 shadow-sm self-start">
                        <h4 class="font-bold mb-4">${t('history')}</h4>
                        <div class="space-y-2">
                            ${parkingHistory.length === 0 ? `<p class="text-sm text-gray-400">${t('history_empty')}</p>` : 
                            parkingHistory.map(h => `<div class="text-sm font-semibold p-3 bg-gray-50 rounded-lg flex justify-between items-center border">
                                <div><span class="block font-bold">Zone ${h.zone} <span class="text-xs text-gray-400 font-normal ml-2">${h.plate}</span></span>
                                <span class="text-xs text-gray-500 block mt-1">${h.startDate} &rarr; ${h.endDate}</span></div>
                                <span class="text-green-600 font-bold">$${h.cost.toFixed(2)}</span>
                            </div>`).reverse().join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function extendSession(id) {
            let session = activeSessions.find(s => s.id === id);
            if(!session) return;
            
            customPrompt(t('add_hours_prompt'), "1", 'number', (extHours) => {
                extHours = parseFloat(extHours);
                if(isNaN(extHours) || extHours <= 0) return;
                let cost = extHours * session.rate;
                
                if(wallet >= cost) {
                    wallet -= cost;
                    session.duration += extHours;
                    session.paidCost += cost;
                    showToast(t('success'), `${t('paid')} $${cost.toFixed(2)}`);
                    showPage('userDashboard');
                } else {
                    customAlert(t('no_funds'));
                    openModal('topUpModal');
                }
            });
        }

        function endSession(id, totalCost) {
            let session = activeSessions.find(s => s.id === id);
            let due = totalCost - session.paidCost; 
            if(due > 0 && wallet < due) {
                customAlert(`${t('no_funds')} (Due: $${due.toFixed(2)})`);
                openModal('topUpModal');
                return;
            }
            if(confirm(lang === 'ru' ? `Точно завершить парковку?` : 'End parking session?')) {
                if(due > 0) {
                    wallet -= due;
                }
                
                // Запись в базу истории (Используется и Юзером и Админом)
                parkingHistory.push({
                    startDate: session.startTime.toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}),
                    endDate: new Date().toLocaleString([], {dateStyle: 'short', timeStyle: 'short'}),
                    zone: session.zone,
                    plate: session.plate,
                    cost: totalCost
                });
                
                activeSessions = activeSessions.filter(s => s.id !== id);
                allBookings = allBookings.filter(b => b.id !== id);
                updateNotifications();
                
                showToast(t('success'), "Session Closed");
                showPage('userDashboard');
            }
        }

        function editRate(id) {
            const z = zones.find(x => x.id === id);
            customPrompt(`${t('new_rate_prompt')} ${z.name}:`, z.rate, 'number', (newRate) => {
                if (newRate && !isNaN(newRate)) {
                    z.rate = parseFloat(newRate);
                    showToast(t('success'), t('rate_updated'));
                    showPage('tariffs');
                }
            });
        }

        // --- PAYMENT & PROFILE FORMS ---
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function processTopUp(e) {
            e.preventDefault(); 
            const amt = parseFloat(document.getElementById('topUpAmount').value);
            if(amt > 0) {
                wallet += amt;
                showToast(t('success'), `+$${amt.toFixed(2)}`);
                closeModal('topUpModal');
                e.target.reset();
                if(currentPageId === 'userDashboard') showPage('userDashboard');
            }
        }

        function saveProfile(e) {
            e.preventDefault();
            userProfile.name = document.getElementById('profName').value;
            userProfile.phone = document.getElementById('profPhone').value;
            userProfile.email = document.getElementById('profEmail').value;
            userProfile.carPlate = document.getElementById('profPlate').value;
            showToast(t('success'), "Profile Saved");
            showPage('profile');
        }

        // --- MAP LOGIC ---
        function initMap(interactive = false) {
            setTimeout(() => {
                if(mapInstance) { mapInstance.remove(); }
                mapInstance = L.map('map').setView([43.2551, 76.9126], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                
                let heatPoints = [];
                
                zones.forEach(z => {
                    let bookedCount = allBookings.filter(b => b.zone === z.id).length;
                    let isBusy = bookedCount > 0;
                    
                    let actionBtn = '';
                    if (interactive) {
                        if (isBusy) {
                            actionBtn = `<button disabled class="mt-3 bg-red-100 text-red-500 px-3 py-2 rounded w-full font-bold cursor-not-allowed">${t('spot_taken')}</button>`;
                        } else {
                            actionBtn = `<button onclick="initiateBooking('${z.id}')" class="mt-3 bg-[#0A58CA] text-white px-3 py-2 rounded w-full font-bold">${t('book_here')}</button>`;
                        }
                    }

                    L.circle(z.coords, { color: isBusy ? '#DC3545' : '#0A58CA', radius: 250, fillOpacity: 0.4 })
                        .addTo(mapInstance)
                        .bindPopup(`<b class="text-sm">${z.name}</b><br><span class="text-gray-500">Rate: $${z.rate.toFixed(2)}/hr</span><br><span class="text-xs font-bold ${isBusy?'text-red-500':'text-green-500'}">Active Cars: ${bookedCount}</span>${actionBtn}`);
                    
                    if(isBusy) { heatPoints.push([z.coords[0], z.coords[1], 1.0]); }
                    else { heatPoints.push([z.coords[0], z.coords[1], 0.1]); }
                });

                if (typeof L.heatLayer !== 'undefined') {
                    const heatLayer = L.heatLayer(heatPoints, {radius: 40, blur: 25, maxZoom: 14});
                    const toggle = document.getElementById('heatmapToggle');
                    if(toggle) {
                        toggle.addEventListener('change', (e) => {
                            if(e.target.checked) heatLayer.addTo(mapInstance);
                            else mapInstance.removeLayer(heatLayer);
                        });
                    }
                }
            }, 200);
        }

        function showToast(title, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('translate-y-24');
            setTimeout(() => t.classList.add('translate-y-24'), 3000);
        }

        // Initialize
        window.onload = () => toggleLang(lang);
    </script>
</body>
</html>
